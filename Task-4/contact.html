<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
     <link rel="stylesheet" href="css/style.min.css">
</head>
<body>

    <header>
        <nav aria-label="Main navigation">
            <h1>My Website</h1>
            <div class="nav-controls">
                <div class="menu-btn">☰</div>
                <button id="themeBtn" aria-label="Toggle dark mode">🌙</button>
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="service.html">Services</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="weather.html">Weather</a></li>
                <li><a href="movies.html">Movies</a></li>
                <li><a href="tools.html">Tools</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <h2>Contact Us</h2>
            <form class="contact-form" id="contactForm" action="#" method="POST">
                <label for="nameInput" class="sr-only">Your Name</label>
                <input type="text" id="nameInput" name="name" placeholder="Your Name" required>
                <span class="error-msg" id="nameError"></span>

                <label for="emailInput" class="sr-only">Your Email</label>
                <input type="email" id="emailInput" name="email" placeholder="Your Email" required>
                <span class="error-msg" id="emailError"></span>

                <label for="phoneInput" class="sr-only">Your Phone Number</label>
                <input type="tel" id="phoneInput" name="phone" placeholder="Your Phone Number">
                <span class="error-msg" id="phoneError"></span>

                <label for="messageInput" class="sr-only">Your Message</label>
                <textarea id="messageInput" name="message" placeholder="Your Message" required></textarea>
                <span class="error-msg" id="messageError"></span>

                <div class="password-wrap">
                    <label for="passwordInput" class="sr-only">Create Password</label>
                    <input type="password" id="passwordInput" name="password" placeholder="Create Password">
                    <div class="password-strength" id="passwordStrength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <span class="strength-text" id="strengthText"></span>
                </div>

                <button type="submit">Send Message</button>
                <span class="success-msg" id="successMsg"></span>
            </form>

            <div class="map-container">
                <h3>Visit My Location!</h3>
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3559.9!2d80.9462!3d26.8467!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjbCsDUwJzQ4LjEiTiA4MMKwNTYnNDYuMyJF!5e0!3m2!1sen!2sin!4v1234567890"
                    width="100%"
                    height="400"
                    style="border:0;"
                    title="My Location on Google Maps"
                    allowfullscreen=""
                    loading="lazy">
                </iframe>
            </div>
        </section>
    </main>

    <button class="top-btn" id="topBtn" aria-label="Back to top">⬆️</button>

    <footer>
        <p>© 2026 My Website. All Rights Reserved.</p>
    </footer>

    <script src="js/script.js" defer></script>

</body>
</html>
